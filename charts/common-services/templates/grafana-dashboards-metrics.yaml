{{/* ============================================================================
    Grafana Dashboards for Metrics-Enabled Services

    This template creates ConfigMaps for Grafana dashboards that are conditionally
    imported based on whether the respective service is enabled.

    All dashboards are automatically provisioned when the service is enabled.
    Prometheus scrapes metrics via service annotations (prometheus.io/scrape).

    Dashboards included:
    - Argo CD (argo-cd)         - GitOps continuous delivery
    - Elasticsearch             - Search and analytics engine
    - HAProxy                   - Load balancer / API gateway
    - PostgreSQL                - Relational database
    - ZooKeeper                 - Coordination service
    - OpenSearch                - Search and analytics (ES alternative)
    - Fluent Bit                - Log processor / forwarder
    - Velero                    - Backup and restore
    - CloudNative PG            - PostgreSQL operator
    - Loki                      - Log aggregation
    - Flink                     - Stream processing operator
    - Kibana                    - Elasticsearch visualization
    - Alloy                     - Observability collector (Grafana Agent)
    - Grafana                   - Self-monitoring metrics
    ============================================================================ */}}

{{/* ----------------------------------------------------------------------------
    Argo CD Dashboard
    Condition: argo-cd.enabled = true
    ---------------------------------------------------------------------------- */}}
{{- if and (.Values.grafana.enabled) (index .Values "argo-cd" "enabled") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-cd-dashboard
  labels:
    grafana_dashboard: "1"
data:
{{ (.Files.Glob "dashboards/argo-cd/argo-cd-dashboard.json").AsConfig | indent 2 }}
---
{{- end }}

