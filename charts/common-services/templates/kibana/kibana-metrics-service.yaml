{{- if .Values.kibana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kibana-metrics
  labels:
    app: kibana
    component: metrics
    {{- include "common-services.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9684
      targetPort: 9684
      protocol: TCP
  selector:
    app: kibana
    release: {{ .Release.Name }}
{{- end }}
