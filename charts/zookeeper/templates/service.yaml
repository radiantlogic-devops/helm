apiVersion: v1
kind: Service
metadata:
  name: {{ include "zookeeper.fullname" . }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
{{- if contains "ClusterIP" .Values.service.type }}
  clusterIP: None
  # Required for StatefulSet pod-DNS resolution during cluster bootstrap.
  # ZK pods need DNS for sibling pods (zookeeper-0,1,2) BEFORE they are Ready
  # so they can form a quorum. Without this, K8s 1.22+ EndpointSlice handling
  # withholds DNS records until pods are Ready -> chicken-and-egg deadlock.
  publishNotReadyAddresses: true
{{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.zk.clientPort }}
      targetPort: zk-client
      protocol: TCP
      name: zk-client
    - port: {{ .Values.zk.ensemblePort }}
      targetPort: zk-ensemble
      protocol: TCP
      name: zk-ensemble
    - port: {{ .Values.zk.leaderRelectionPort }}
      targetPort: zk-election
      protocol: TCP
      name: zk-election
  selector:
    {{- include "zookeeper.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-app
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.zk.clientPort }}
      targetPort: zk-client
      protocol: TCP
      name: zk-client
  selector:
    {{- include "zookeeper.selectorLabels" . | nindent 4 }}
